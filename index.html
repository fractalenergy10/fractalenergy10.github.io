<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>We're Rebuilding — Coming Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --border: rgba(255,255,255,0.08);
      --text-primary: #f0ede6;
      --text-muted: #888580;
      --accent: #c8b89a;
      --accent-dim: rgba(200,184,154,0.12);
    }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 70% 20%, rgba(200,184,154,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 40% 50% at 20% 80%, rgba(200,184,154,0.04) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    .grain {
      position: fixed;
      inset: 0;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 180px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 640px;
      width: 100%;
      text-align: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--accent-dim);
      border: 1px solid rgba(200,184,154,0.2);
      border-radius: 100px;
      padding: 6px 16px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 2.5rem;
      animation: fadeUp 0.6s ease both;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.75); }
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2.8rem, 6vw, 4.5rem);
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      margin-bottom: 1.5rem;
      animation: fadeUp 0.6s 0.1s ease both;
    }

    h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .subtitle {
      font-size: 1.05rem;
      font-weight: 300;
      color: var(--text-muted);
      line-height: 1.75;
      max-width: 440px;
      margin: 0 auto 3rem;
      animation: fadeUp 0.6s 0.2s ease both;
    }

    .divider {
      width: 48px;
      height: 1px;
      background: var(--border);
      margin: 0 auto 2.5rem;
      animation: fadeUp 0.6s 0.25s ease both;
    }

    .contact {
      font-size: 0.875rem;
      color: var(--text-muted);
      animation: fadeUp 0.6s 0.3s ease both;
    }

    .contact a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid rgba(200,184,154,0.3);
      padding-bottom: 1px;
      transition: border-color 0.2s;
    }

    .contact a:hover {
      border-color: var(--accent);
    }

    .corner-tl, .corner-br {
      position: fixed;
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.15);
      font-weight: 400;
      z-index: 1;
    }

    .corner-tl { top: 2rem; left: 2rem; }
    .corner-br { bottom: 2rem; right: 2rem; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .corner-tl, .corner-br { display: none; }
    }
  </style>
</head>
<body>
  <div class="grain"></div>

  <span class="corner-br">© 2026</span>
    </div>

    <h1>We're <em>rebuilding</em><br>something better</h1>

    <p class="subtitle">
      Our website is currently undergoing a full redesign.
      We'll be back soon with a fresh new experience.
    </p>

    <div class="divider"></div>

    <p class="contact">
      Questions? Reach us at <a href="mailto:info@fractalenergy.in">info@fractalenergy.in</a>
    </p>
  </div>
</body>
</html>
